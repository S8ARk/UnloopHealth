<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUTRICORE | Detailed Analytics</title>
    <link rel="stylesheet" href="../css/base.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        .report-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 24px;
            margin-top: 30px;
        }
        .analytics-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .memo-list {
            list-style: none;
            padding: 0;
            margin-top: 15px;
        }
        .memo-item {
            padding: 12px 16px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.95rem;
        }
        .memo-do { background: rgba(0, 255, 128, 0.08); border-left: 4px solid #00ff80; color: #00ff80; }
        .memo-dont { background: rgba(255, 71, 71, 0.08); border-left: 4px solid #ff4747; color: #ff4747; }
        
        .stat-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin: 10px 0 20px;
            overflow: hidden;
        }
        .stat-progress {
            height: 100%;
            background: var(--accent-blue);
            width: 70%;
            transition: width 0.5s ease-out;
        }
        .risk-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 600;
        }
        .risk-low { background: rgba(0, 255, 128, 0.2); color: #00ff80; }
        .risk-high { background: rgba(255, 71, 71, 0.2); color: #ff4747; }
    </style>
</head>
<body class="dark-theme">
    <div class="sidebar">
        <h1 class="logo">NUTRICORE</h1>
        <nav>
            <a href="dashboard.html" class="nav-item">Dashboard</a>
            <a href="tracker.html" class="nav-item">Meal Tracker</a>
            <a href="profile.html" class="nav-item">Health Profile</a>
            <a href="report.html" class="nav-item active">Analytics</a>
        </nav>
        <div class="sidebar-footer">
            <button class="nav-item" onclick="logout()">Logout</button>
        </div>
    </div>

    <main class="main-content">
        <header class="header">
            <div>
                <h1 id="userGreeting">Your Health Intelligence</h1>
                <p>Detailed insights generated by NUTRICORE AI engine.</p>
            </div>
            <button class="btn btn-secondary" onclick="window.location.reload()">Refresh Data</button>
        </header>

        <div class="report-grid">
            <!-- Risk Probabilities -->
            <div class="analytics-card">
                <h3>Vulnerability Matrix</h3>
                <div id="riskBars" style="margin-top: 20px;">
                    <!-- DYNAMIC: Low, Medium, High percentage bars -->
                    Loading assessments...
                </div>
            </div>

            <!-- Projections -->
            <div class="analytics-card">
                <h3>30-Day Projections</h3>
                <div style="margin-top: 20px;">
                    <div class="flex-between">
                        <span>Projected BMI</span>
                        <strong id="projBMI">--</strong>
                    </div>
                    <div class="stat-bar"><div class="stat-progress" id="bmiBar" style="width: 0%"></div></div>
                    
                    <div class="flex-between">
                        <span>Risk Trend</span>
                        <span class="risk-badge risk-low" id="riskTrend">Improving</span>
                    </div>
                </div>
            </div>

            <!-- Dos: Positive Reinforcement -->
            <div class="analytics-card">
                <h3 style="color: #00ff80;">Daily Habit Memos (Dos)</h3>
                <ul class="memo-list" id="dosList">
                    <!-- DYNAMIC -->
                </ul>
            </div>

            <!-- Don'ts: Critical Warnings -->
            <div class="analytics-card">
                <h3 style="color: #ff4747;">Warning Memos (Don'ts)</h3>
                <ul class="memo-list" id="dontsList">
                    <!-- DYNAMIC -->
                </ul>
            </div>
        </div>
    </main>

    <script type="module">
        import { api } from '../js/api.js';

        async function loadAnalytics() {
            try {
                const response = await api.get('/analytics/predict');
                const data = response.data;
                
                document.getElementById('userGreeting').innerText = `Insights for ${response.user_name || 'You'}`;
                
                // 1. Projections
                document.getElementById('projBMI').innerText = data.future_bmi;
                document.getElementById('bmiBar').style.width = (data.future_bmi / 40 * 100) + '%';
                
                // 2. Risk Bars
                const riskBars = document.getElementById('riskBars');
                riskBars.innerHTML = '';
                for (const [lvl, prob] of Object.entries(data.risk_probs)) {
                    const pct = (prob * 100).toFixed(1);
                    riskBars.innerHTML += `
                        <div class="flex-between"><span>${lvl} Risk</span><span>${pct}%</span></div>
                        <div class="stat-bar"><div class="stat-progress" style="width: ${pct}%"></div></div>
                    `;
                }

                // 3. Dos
                const dosList = document.getElementById('dosList');
                data.recommendations.dos.forEach(item => {
                    dosList.innerHTML += `<li class="memo-item memo-do">✅ ${item}</li>`;
                });

                // 4. Don'ts
                const dontsList = document.getElementById('dontsList');
                data.recommendations.donts.forEach(item => {
                    dontsList.innerHTML += `<li class="memo-item memo-dont">🚫 ${item}</li>`;
                });

            } catch (err) {
                console.error(err);
                if (err.status === 404) {
                    alert("Please complete your health profile first!");
                    window.location.href = 'profile.html';
                }
            }
        }

        loadAnalytics();
    </script>
</body>
</html>
