<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | NUTRICORE</title>
  <link rel="stylesheet" href="../css/base.css">
  <script src="../js/api.js" defer></script>
  <style>
    .header-section {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 3rem;
    }
    
    .risk-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }
    
    .risk-card {
      position: relative;
      overflow: hidden;
    }
    
    .risk-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
    }
    
    .risk-card.low::before { background: var(--risk-low); }
    .risk-card.moderate::before { background: var(--risk-moderate); }
    .risk-card.high::before { background: var(--risk-high); }
    .risk-card.critical::before { background: var(--risk-critical); }
    
    .countdown-timer {
      font-family: 'Outfit', sans-serif;
      font-size: 2.5rem;
      font-weight: 700;
      margin: 1rem 0;
    }
    
    .factor-tag {
      font-size: 0.75rem;
      background: rgba(255,   255, 255, 0.05);
      padding: 0.25rem 0.5rem;
      border-radius: 0.25rem;
      margin-right: 0.5rem;
    }
    
    .health-score-ring {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: conic-gradient(var(--risk-low) 85%, transparent 0);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    
    .health-score-ring::after {
      content: '';
      position: absolute;
      width: 100px;
      height: 100px;
      background: var(--bg-dark);
      border-radius: 50%;
      display: block;
    }
  </style>
</head>
<body>
  <div class="dashboard-layout">
    <aside class="sidebar">
      <div class="logo">NUTRICORE</div>
      <nav style="display: flex; flex-direction: column; gap: 0.5rem;">
        <a href="dashboard.html" class="nav-item active">Dashboard</a>
        <a href="tracker.html" class="nav-item">Meal Tracker</a>
        <a href="profile.html" class="nav-item">Health Profile</a>
        <a href="report.html" class="nav-item">Analytics</a>
      </nav>
      <div style="margin-top: auto;">
        <button class="nav-item" id="logoutBtn" style="background:none; border:none; width:100%; cursor:pointer;">Logout</button>
      </div>
    </aside>

    <main class="main-content">
      <div class="header-section">
        <div>
          <h1 id="welcomeUser">Welcome back...</h1>
          <p class="text-muted" id="habitSummary">Loading your health trends...</p>
        </div>
        <div class="health-score-ring" id="overallScore" style="background: conic-gradient(var(--risk-low) 0%, transparent 0);"></div>
      </div>

      <h2 style="margin-bottom: 1.5rem; font-family: 'Outfit';">Disease Proximity Countdowns</h2>
      
      <div class="risk-grid" id="riskGrid">
        <!-- Cards will be dynamic -->
        <div class="glass-card" style="padding: 2rem; text-align: center;">Analyzing metrics...</div>
      </div>
      
      <!-- Habit Memos -->
      <h3 style="margin: 2rem 0 1rem; font-family: 'Outfit';">Quick Action Memos</h3>
      <div id="habitMemos" style="display: flex; gap: 1rem; overflow-x: auto; padding-bottom: 1rem;"></div>
    </main>
  </div>

  <script type="module">
    import { api } from '../js/api.js';

    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const response = await api.getRiskScores();
        const data = response.data;
        
        const userObj = JSON.parse(sessionStorage.getItem('user') || '{}');
        const userName = userObj.full_name || 'User';
        
        document.getElementById('welcomeUser').textContent = `Welcome back, ${userName}`;
        
        const memos = data.recommendations && data.recommendations.dos ? data.recommendations.dos : [];
        document.getElementById('habitSummary').textContent = `You have ${memos.length} personalized memos today.`;

        // Update Score Ring
        const riskMap = {"Low": 90, "Moderate": 70, "High": 45, "Critical": 15};
        const score = riskMap[data.risk_label] || 50;
        const ring = document.getElementById('overallScore');
        ring.style.background = `conic-gradient(var(--risk-low) ${score}%, transparent 0)`;
        ring.setAttribute('style', ring.getAttribute('style') + `; --score: '${score}'`);
        ring.innerHTML = `<span style="position:absolute; z-index: 10; font-size:1.5rem; font-weight:700;">${score}</span>`;

        // Update Risk Grid
        const grid = document.getElementById('riskGrid');
        grid.innerHTML = `
          <div class="glass-card risk-card ${data.risk_label.toLowerCase()}">
            <p class="text-muted" style="font-size: 0.8rem; text-transform: uppercase;">Overall Health Risk</p>
            <div class="countdown-timer" style="color: var(--risk-${data.risk_label.toLowerCase()})">${data.risk_label}</div>
            <p style="font-size: 0.9rem; margin-bottom: 1rem;">Assessment based on your unique diagnostic baseline.</p>
          </div>
          <div class="glass-card risk-card info">
            <p class="text-muted" style="font-size: 0.8rem; text-transform: uppercase;">30-Day BMI Forecast</p>
            <div class="countdown-timer">${data.future_bmi}</div>
            <p style="font-size: 0.9rem; margin-bottom: 1rem;">Projected trend based on current logs.</p>
          </div>
        `;

        // Update Memos
        const memoBox = document.getElementById('habitMemos');
        memoBox.innerHTML = '';
        memos.slice(0, 3).forEach(memo => {
          memoBox.innerHTML += `
            <div class="glass-card" style="min-width: 250px; border-left: 4px solid var(--risk-low);">
              <p style="font-size: 0.7rem; color: var(--risk-low); font-weight: 700; margin-bottom: 5px;">DO</p>
              <p style="font-size: 0.9rem;">${memo}</p>
            </div>
          `;
        });

      } catch (err) {
        console.error(err);
        if (err.message.includes('No profile found') || err.message.includes('Please complete your health profile first')) {
            window.location.href = 'profile.html';
        }
        else if (err.message.includes('Missing Authorization')) {
            window.location.href = 'login.html';
        } else {
            // Keep original "Loading..." text but show error status
            document.getElementById('habitSummary').textContent = "Failed to load trends: " + err.message;
        }
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      sessionStorage.removeItem('access_token');
      sessionStorage.removeItem('user');
      window.location.href = 'login.html';
    });
  </script>
</body>
</html>
