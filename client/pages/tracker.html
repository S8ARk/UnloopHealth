<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meal Tracker | NutriCore 2.0</title>
  <link rel="stylesheet" href="../css/base.css">
  <script src="../js/api.js" defer></script>
  <style>
    .dashboard-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: 100vh;
    }
    
    .sidebar {
      background: rgba(15, 23, 42, 0.9);
      border-right: 1px solid var(--border);
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }
    
    .nav-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 600;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      transition: var(--transition);
    }
    
    .nav-item:hover, .nav-item.active {
      background: rgba(99, 102, 241, 0.1);
      color: var(--primary);
    }
    
    .main-content {
      padding: 3rem;
    }
    
    .tracker-grid {
      display: grid;
      grid-template-columns: 1fr 350px;
      gap: 2rem;
    }
    
    .meal-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    
    .search-card {
      padding: 1.5rem;
      margin-bottom: 2rem;
    }
    
    .food-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem;
      border-bottom: 1px solid var(--border);
      transition: var(--transition);
    }
    
    .food-item:hover {
      background: rgba(255, 255, 255, 0.02);
    }
    
    .macro-summary {
      position: sticky;
      top: 3rem;
    }
    
    .macro-bar {
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      margin-top: 0.5rem;
      overflow: hidden;
    }
    
    .macro-progress {
      height: 100%;
      background: var(--primary);
      width: 0%;
      transition: width 0.5s ease;
    }
  </style>
</head>
<body>
  <div class="dashboard-layout">
    <aside class="sidebar">
      <div class="logo">NutriCore<span style="color: var(--secondary)">.2</span></div>
      <nav style="display: flex; flex-direction: column; gap: 0.5rem;">
        <a href="dashboard.html" class="nav-item">Dashboard</a>
        <a href="#" class="nav-item active">Meal Tracker</a>
        <a href="profile.html" class="nav-item">Health Profile</a>
        <a href="report.html" class="nav-item">Analytics</a>
      </nav>
      <div style="margin-top: auto;">
        <a href="../index.html" class="nav-item">Logout</a>
      </div>
    </aside>

    <main class="main-content">
      <h1 style="margin-bottom: 2rem; font-family: 'Outfit';">Log Your Nutrition</h1>
      
      <div class="tracker-grid">
        <div class="tracker-main">
          <div class="glass-card search-card">
            <input type="text" id="foodSearch" class="input-field" placeholder="Search foods (e.g. Roti, Paneer)...">
            <div id="searchResults" style="margin-top: 1rem;">
              <!-- Initially populated with seeds or empty -->
              <p class="text-muted" style="font-size: 0.8rem; text-align: center;">Type to search nutritional database...</p>
            </div>
          </div>

          <h2 style="margin-bottom: 1rem; font-size: 1.25rem;">Today's Log</h2>
          <div class="glass-card meal-list" id="mealLog">
            <div class="text-muted" style="padding: 2rem; text-align: center;">No meals logged for today.</div>
          </div>
        </div>

        <aside class="tracker-aside">
          <div class="glass-card macro-summary">
            <h3>Daily Macros</h3>
            <p class="text-muted" style="font-size: 0.8rem; margin-bottom: 1.5rem;">Based on your health profile</p>
            
            <div style="margin-bottom: 1.5rem;">
              <div style="display: flex; justify-content: space-between; font-size: 0.8rem;">
                <span>Proteins</span>
                <span>0 / 120g</span>
              </div>
              <div class="macro-bar"><div class="macro-progress" style="width: 5%; background: var(--secondary);"></div></div>
            </div>

            <div style="margin-bottom: 1.5rem;">
              <div style="display: flex; justify-content: space-between; font-size: 0.8rem;">
                <span>Carbohydrates</span>
                <span>0 / 250g</span>
              </div>
              <div class="macro-bar"><div class="macro-progress" style="width: 12%; background: var(--primary);"></div></div>
            </div>

            <div style="margin-bottom: 1.5rem;">
              <div style="display: flex; justify-content: space-between; font-size: 0.8rem;">
                <span>Fats</span>
                <span>0 / 70g</span>
              </div>
              <div class="macro-bar"><div class="macro-progress" style="width: 8%; background: var(--risk-moderate);"></div></div>
            </div>

            <hr style="border: 0; border-top: 1px solid var(--border); margin: 1rem 0;">
            <div style="display: flex; justify-content: space-between;">
              <span>Total Calories</span>
              <span style="font-weight: 700;">0 kcal</span>
            </div>
          </div>
        </aside>
      </div>
    </main>
  </div>
</body>
</html>
