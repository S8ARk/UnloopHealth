<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | NutriCore 2.0</title>
  <link rel="stylesheet" href="../css/base.css">
  <style>
    .auth-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    
    .auth-form {
      width: 100%;
      max-width: 400px;
      padding: 2.5rem;
    }
    
    .auth-title {
      font-size: 1.875rem;
      font-family: 'Outfit', sans-serif;
      margin-bottom: 0.5rem;
      text-align: center;
    }
    
    .auth-subtitle {
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }
    
    .form-group {
      margin-bottom: 1.25rem;
    }
    
    label {
      display: block;
      font-size: 0.875rem;
      margin-bottom: 0.5rem;
      color: var(--text-main);
    }
    
    .auth-footer {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.875rem;
      color: var(--text-muted);
    }
    
    .auth-footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }
    
    .error-msg {
      color: var(--risk-high);
      background: rgba(239, 68, 68, 0.1);
      padding: 0.75rem;
      border-radius: 0.5rem;
      margin-bottom: 1rem;
      display: none;
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="glass-card auth-form">
      <h2 class="auth-title">Welcome Back</h2>
      <p class="auth-subtitle">Login to monitor your health risks</p>
      
      <div id="errorMessage" class="error-msg"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="input-field" placeholder="name@company.com" required>
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="input-field" placeholder="••••••••" required>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign In</button>
      </form>
      
      <p class="auth-footer">
        Don't have an account? <a href="register.html">Create one</a>
      </p>
    </div>
  </div>

  <script type="module">
    import { api } from '../js/api.js';

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('errorMessage');
      
      try {
        errorEl.style.display = 'none';
        
        await api.login(email, password);
        
        // Redirect on success
        window.location.href = 'dashboard.html';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
