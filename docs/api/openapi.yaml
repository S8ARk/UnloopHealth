openapi: 3.1.0
info:
  title: AI Smart Nutrition API
  description: FastAPI backend for NutriCore
  version: 1.0.0
paths:
  /auth/login:
    post:
      summary: User login
      responses:
        '200':
          description: Successful login (Sets HttpOnly Cookies)
        '401':
          description: Unauthorized
  /auth/register:
    post:
      summary: User registration
      responses:
        '201':
          description: Created
  /users/profile:
    get:
      summary: Get user profile
      responses:
        '200':
          description: Profile retrieved
    put:
      summary: Update user profile
      responses:
        '200':
          description: Profile updated
  /meals:
    get:
      summary: Retrieve meal logs for the current user
      responses:
        '200':
          description: Meal logs retrieved
    post:
      summary: Log a new meal
      responses:
        '201':
          description: Meal strictly logged
  /ai/predict-food:
    post:
      summary: Predict food from image (YOLOv8)
      responses:
        '200':
          description: Food identified with acceptable variance
  /ai/advice:
    post:
      summary: Get personalized advice (RAG)
      responses:
        '200':
          description: Advice generated
